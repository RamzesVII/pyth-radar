  <!-- Radar sweep — wide glow (north → 60° clockwise) -->
  <!-- North: (50,6)  60° CW from north: (88,28) -->
  <path d="M50,50 L50,6 A44,44,0,0,1,88,28 Z" fill="rgba(255,255,255,0.07)"/>

  <!-- Radar sweep — bright edge near scan line (last ~20°) -->
  <!-- 40° CW from north: (78,17) -->
  <path d="M50,50 L78,17 A44,44,0,0,1,88,28 Z" fill="rgba(255,255,255,0.22)"/>

  <!-- Concentric circles -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
  <circle cx="50" cy="50" r="33" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="0.6"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.8"/>

  <!-- Scan line -->
  <line x1="50" y1="50" x2="88" y2="28"
        stroke="rgba(255,255,255,0.90)" stroke-width="1.2"/>

